name: Fuzz

on:
  push:
    branches: [main, dev]
  schedule:
    # Run daily at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_decrypt
          - fuzz_hkdf_derive
          - fuzz_hybrid_decapsulate
          - fuzz_hybrid_verify

    steps:
      - uses: actions/checkout@v4

      - name: Install mold linker
        # The repo's `.cargo/config.toml` forces `-fuse-ld=mold` on
        # `x86_64-unknown-linux-gnu`, so every build (including fuzzers)
        # needs `mold` on PATH. The reusable CI workflows install it the
        # same way; we must mirror it here or `cargo fuzz` fails at link
        # time on `ubuntu-latest`.
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-binstall
        # Pinned action commit (v1.19.1) — fetches a checksummed cargo-binstall
        # binary from its signed GitHub release.
        uses: cargo-bins/cargo-binstall@aaa84a43aec4955a42c5ffc65d258961e39f276e # v1.19.1

      - name: Install cargo-fuzz
        # Use the upstream prebuilt binary from the cargo-fuzz GitHub release
        # (checksum verified by cargo-binstall). This avoids both the supply-
        # chain risk of an unlocked `cargo install` AND the build failure of
        # `cargo install --locked cargo-fuzz` (its 0.13.1 Cargo.lock pins an
        # older `rustix` that no longer compiles on current nightly).
        run: cargo binstall --no-confirm --version 0.13.1 cargo-fuzz

      - name: Restore corpus cache
        uses: actions/cache/restore@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Run fuzzer (300 s)
        # `--target x86_64-unknown-linux-gnu` is required: cargo-binstall fetches
        # the statically-linked musl release of cargo-fuzz, which embeds its own
        # compile-time target tuple (`x86_64-unknown-linux-musl`) as the default
        # fuzz build target. Building fuzzers for musl is incompatible with the
        # address sanitizer (`sanitizer is incompatible with statically linked
        # libc`), so we pin the build to the runner's native glibc triple.
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} \
            --target x86_64-unknown-linux-gnu \
            -- -max_total_time=300 -max_len=65536

      - name: Ensure corpus directory exists
        # actions/cache/save fails the step if the path does not exist. The
        # fuzzer creates the directory the first time it persists an input,
        # but a build/tooling failure earlier in `cargo fuzz run` would leave
        # the path missing and mask the real error behind a cache-save error.
        if: always()
        run: mkdir -p fuzz/corpus/${{ matrix.target }}

      - name: Save corpus cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: crash-${{ matrix.target }}-${{ github.sha }}
          # `if-no-files-found: ignore` avoids masking a build/tooling failure
          # with an artifact-upload error: when the fuzzer never reached the
          # crash-writing stage, the artifacts directory simply does not exist.
          if-no-files-found: ignore
          path: |
            fuzz/artifacts/${{ matrix.target }}/
